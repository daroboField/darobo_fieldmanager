<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <title>Darobo Insight Center</title>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="60" height="60" rx="12" fill="url(#bgGrad)"/>

  <!-- Planets -->
  <circle cx="12" cy="14" r="4" fill="#60A5FA" opacity="0.9"/>
  <circle cx="48" cy="12" r="3" fill="#A78BFA" opacity="0.9"/>
  <circle cx="50" cy="44" r="4.5" fill="#34D399" opacity="0.9"/>
  <circle cx="10" cy="46" r="3" fill="#F472B6" opacity="0.9"/>

  <!-- Astronaut body -->
  <ellipse cx="30" cy="34" rx="8" ry="9" fill="white" opacity="0.95"/>
  <!-- Helmet -->
  <circle cx="30" cy="22" r="7" fill="white" opacity="0.95"/>
  <!-- Visor -->
  <circle cx="30" cy="22" r="4.5" fill="#93C5FD" opacity="0.85"/>
  <!-- Arms -->
  <ellipse cx="20" cy="33" rx="3" ry="5" fill="white" opacity="0.9" transform="rotate(-15 20 33)"/>
  <ellipse cx="40" cy="33" rx="3" ry="5" fill="white" opacity="0.9" transform="rotate(15 40 33)"/>
  <!-- Legs -->
  <ellipse cx="25" cy="44" rx="3" ry="5" fill="white" opacity="0.9"/>
  <ellipse cx="35" cy="44" rx="3" ry="5" fill="white" opacity="0.9"/>

  <!-- D.I.C text -->
  <text x="30" y="57" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" font-weight="700" fill="white" letter-spacing="1">D.I.C</text>
</svg>
